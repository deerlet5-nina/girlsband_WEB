name: Deploy Stage Reimagined to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-pages.yml"
      - "stage-reimagined/**"
      - "images/**"
      - "music/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare publish directory
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site

          cp -R stage-reimagined _site/stage-reimagined
          cp -R images _site/images
          cp -R music _site/music
          touch _site/.nojekyll

          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Girls Band Stage Reimagined</title>
            <meta http-equiv="refresh" content="0; url=stage-reimagined/">
            <style>
              :root {
                color-scheme: dark;
                --bg: #11131a;
                --panel: rgba(19, 23, 36, 0.86);
                --line: rgba(255, 255, 255, 0.12);
                --ink: #f5f7fb;
                --muted: #a5adc0;
                --accent: #7aa9ff;
                --accent-alt: #f08f79;
              }

              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                padding: 24px;
                font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
                color: var(--ink);
                background:
                  radial-gradient(circle at top, rgba(122, 169, 255, 0.24), transparent 38%),
                  radial-gradient(circle at 80% 20%, rgba(240, 143, 121, 0.22), transparent 24%),
                  linear-gradient(180deg, #0c0f16 0%, #131827 100%);
              }

              main {
                width: min(720px, 100%);
                padding: 36px;
                border-radius: 32px;
                background: var(--panel);
                border: 1px solid var(--line);
                box-shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
                backdrop-filter: blur(14px);
              }

              .kicker {
                display: inline-flex;
                padding: 8px 14px;
                border-radius: 999px;
                background: rgba(122, 169, 255, 0.14);
                color: var(--accent);
                font-size: 14px;
                letter-spacing: 0.08em;
                text-transform: uppercase;
              }

              h1 {
                margin: 18px 0 12px;
                font-size: clamp(32px, 5vw, 54px);
                line-height: 1.05;
              }

              p {
                margin: 0;
                font-size: 17px;
                line-height: 1.75;
                color: var(--muted);
              }

              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 14px;
                margin-top: 28px;
              }

              a {
                text-decoration: none;
              }

              .primary,
              .secondary {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 48px;
                padding: 0 18px;
                border-radius: 18px;
                font-weight: 700;
                transition: transform 0.18s ease, opacity 0.18s ease, border-color 0.18s ease;
              }

              .primary {
                color: #0d1220;
                background: linear-gradient(135deg, var(--accent), #b6cafe);
              }

              .secondary {
                color: var(--ink);
                border: 1px solid var(--line);
                background: rgba(255, 255, 255, 0.04);
              }

              .primary:hover,
              .secondary:hover {
                transform: translateY(-2px);
                opacity: 0.96;
              }
            </style>
            <script>
              window.location.replace("stage-reimagined/");
            </script>
          </head>
          <body>
            <main>
              <span class="kicker">GitHub Pages</span>
              <h1>Redirecting to Stage Reimagined</h1>
              <p>If your browser does not redirect automatically, use the link below to open the new site. The GitHub Pages entry point now forwards to <code>stage-reimagined</code>.</p>
              <div class="actions">
                <a class="primary" href="stage-reimagined/">Open the new site</a>
                <a class="secondary" href="https://github.com/deerlet5-nina/girlsband_WEB">View the GitHub repo</a>
              </div>
            </main>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
