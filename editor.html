<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - Girls Band Animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.ckeditor.com/4.16.2/standard/ckeditor.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f5f5f5;
            --border-color: #e0e0e0;
            --hover-color: #e85a8f;
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --card-bg: #2d2d2d;
            --border-color: #404040;
            --hover-color: #ff6b9c;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 10px var(--shadow-color);
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .editor-title {
            font-size: 24px;
            color: var(--text-color);
        }

        .editor-controls {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn-primary {
            background-color: #e85a8f;
            color: white;
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 5px var(--shadow-color);
        }

        .btn-primary:hover {
            background-color: #bd4f8c;
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .file-selector {
            margin-bottom: 20px;
        }

        .file-selector select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 14px;
        }

        .ck-editor__editable {
            min-height: 500px;
            max-height: 800px;
            overflow-y: auto;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 1000;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .toast.error {
            background: #f44336;
        }

        .toast.warning {
            background: #ff9800;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .theme-toggle:hover {
            transform: rotate(30deg);
        }

        @media (max-width: 768px) {
            .editor-container {
            padding: 10px;
            }

            .editor-header {
                flex-direction: column;
                gap: 10px;
            }

            .editor-controls {
                width: 100%;
                justify-content: space-between;
            }

            .btn {
                padding: 8px 15px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
        <i class="fas fa-moon"></i>
    </button>

    <div class="editor-container">
        <div class="editor-header">
            <h1 class="editor-title">内容管理</h1>
            <div class="editor-controls">
                <button class="btn btn-primary" id="saveBtn">
                    <i class="fas fa-save"></i> 保存
                </button>
                <button class="btn btn-secondary" id="previewBtn">
                    <i class="fas fa-eye"></i> 预览
                </button>
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> 返回
                </a>
            </div>
        </div>

        <div class="file-selector">
            <select id="fileSelect">
                <option value="">选择要编辑的文件...</option>
                <option value="index.html">首页 (index.html)</option>
                <option value="k-on/index.html">轻音少女 (k-on/index.html)</option>
                <option value="bocchi/index.html">孤独摇滚 (bocchi/index.html)</option>
                <option value="mygo/index.html">MYGO!! (mygo/index.html)</option>
                <option value="gbc/index.html">Girls Band Cry (gbc/index.html)</option>
                        </select>
        </div>

        <textarea id="editor"></textarea>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // 检查登录状态
        function checkLoginStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }
        }

        // 页面加载时检查登录状态
        document.addEventListener('DOMContentLoaded', checkLoginStatus);

        // 初始化 CKEditor
        CKEDITOR.replace('editor', {
            height: 500,
            removePlugins: 'elementspath,resize',
            toolbarGroups: [
                { name: 'document', groups: [ 'mode', 'document', 'doctools' ] },
                { name: 'clipboard', groups: [ 'clipboard', 'undo' ] },
                { name: 'editing', groups: [ 'find', 'selection', 'spellchecker', 'editing' ] },
                { name: 'forms', groups: [ 'forms' ] },
                '/',
                { name: 'basicstyles', groups: [ 'basicstyles', 'cleanup' ] },
                { name: 'paragraph', groups: [ 'list', 'indent', 'blocks', 'align', 'bidi', 'paragraph' ] },
                { name: 'links', groups: [ 'links' ] },
                { name: 'insert', groups: [ 'insert' ] },
                '/',
                { name: 'styles', groups: [ 'styles' ] },
                { name: 'colors', groups: [ 'colors' ] },
                { name: 'tools', groups: [ 'tools' ] },
                { name: 'others', groups: [ 'others' ] }
            ]
        });

        // 主题切换功能
        const themeToggle = document.getElementById('themeToggle');
        const icon = themeToggle.querySelector('i');
        
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            icon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // 文件选择处理
        const fileSelect = document.getElementById('fileSelect');
        fileSelect.addEventListener('change', async function() {
            const selectedFile = this.value;
            if (!selectedFile) return;

            try {
                const response = await fetch(selectedFile);
                if (!response.ok) throw new Error('文件加载失败');
                
                const content = await response.text();
                CKEDITOR.instances.editor.setData(content);
                
                showToast('文件加载成功', 'success');
            } catch (error) {
                showToast('文件加载失败: ' + error.message, 'error');
            }
        });

        // 保存按钮处理
        document.getElementById('saveBtn').addEventListener('click', async function() {
            const selectedFile = fileSelect.value;
            if (!selectedFile) {
                showToast('请先选择要编辑的文件', 'warning');
                return;
            }

            const content = CKEDITOR.instances.editor.getData();
            
            try {
                const response = await fetch('save.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `content=${encodeURIComponent(content)}&filename=${encodeURIComponent(selectedFile)}`
                });

                const result = await response.json();
                
                if (result.success) {
                    showToast('文件保存成功', 'success');
                } else {
                    throw new Error(result.message);
                }
                } catch (error) {
                showToast('保存失败: ' + error.message, 'error');
            }
        });

        // 预览按钮处理
        document.getElementById('previewBtn').addEventListener('click', function() {
            const selectedFile = fileSelect.value;
            if (!selectedFile) {
                showToast('请先选择要预览的文件', 'warning');
                return;
            }

            const content = CKEDITOR.instances.editor.getData();
            const previewWindow = window.open('', '_blank');
            previewWindow.document.write(content);
            previewWindow.document.close();
        });

        // Toast 提示函数
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            
            setTimeout(() => {
            toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
